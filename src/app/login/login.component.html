<div class="container">
    <div class="row">

        <h2>Login</h2>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="username">Cell Number</label>
                <input type="text" formControlName="username" class="form-control" [ngClass]="{ 'is-invalid': submitted && f.username.errors }" />
                <div *ngIf="submitted && f.username.errors" class="invalid-feedback">
                    <div *ngIf="f.username.errors.required">Username is required</div>
                </div>
            </div>
            <br/>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" formControlName="password" class="form-control" [ngClass]="{ 'is-invalid': submitted && f.password.errors }" />
                <div *ngIf="submitted && f.password.errors" class="invalid-feedback">
                    <div *ngIf="f.password.errors.required">Password is required</div>
                </div>
            </div>
            <br/>
            <div class="form-group">
                <button [disabled]="loading" class="btn btn-primary" style="background-color: #C93D8D; border-color: #C93D8D;">
                    <span *ngIf="loading" class="spinner-border spinner-border-sm mr-1"></span>
                    Login
                </button>
                <a routerLink="/register" class="btn btn-link" style="color:#C93D8D;" >Register</a>
            </div>
            <br/>
            <div class="form-group">              
                <a routerLink="/passwordreset" class="btn btn-link" style="color:#C93D8D;" >Reset Password</a>
            </div>
        </form>
    </div>
</div>

<div fxHide fxShow.gt-sm> <br/><br/><br/><br/><br/><br/><br/><br/><br/><br/><br/><br/><br/> </div>
